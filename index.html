
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>专业网站首页</title>
    <style>
        /* 通用样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            color: #333;
        }

        h1, h2, h3 {
            margin: 0;
            padding: 0;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 导航栏样式 */
        nav {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-size: 24px;
            font-weight: bold;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        nav ul li a:hover {
            background-color: #555;
        }

        /* 轮播图样式 */
        .carousel {
            width: 100%;
            height: 500px;
            background-color: #333;
            position: relative;
            overflow: hidden;
        }

        .carousel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 1s ease-in-out;
        }

        .carousel .slides {
            display: flex;
            width: 300%;
            transition: transform 1s ease;
        }

        .carousel .slides img {
            width: 33.33%;
        }

        /* 主内容区域 */
        .main-content {
            padding: 40px 20px;
            text-align: center;
            background-color: #fff;
        }

        .main-content h2 {
            font-size: 36px;
            color: #333;
            margin-bottom: 20px;
        }

        .main-content p {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .main-content .cta-button {
            padding: 10px 30px;
            background-color: #007BFF;
            color: #fff;
            border-radius: 5px;
            font-size: 18px;
            text-transform: uppercase;
            transition: background-color 0.3s;
        }

        .main-content .cta-button:hover {
            background-color: #0056b3;
        }

        /* 页脚样式 */
        footer {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        footer a {
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        footer a:hover {
            background-color: #555;
        }

        /* 响应式设计 */
        @media screen and (max-width: 768px) {
            nav {
                flex-direction: column;
                text-align: center;
            }

            .carousel {
                height: 300px;
            }

            .main-content h2 {
                font-size: 28px;
            }

            .main-content p {
                font-size: 16px;
            }

            .main-content .cta-button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<!-- 导航栏 -->
<nav>
    <div class="logo">我的网站</div>
    <ul>
        <li><a href="#home">首页</a></li>
        <li><a href="#about">关于我们</a></li>
        <li><a href="#services">服务</a></li>
        <li><a href="#contact">联系我们</a></li>
    </ul>
</nav>

<!-- 轮播图 -->
<div class="carousel">
    <div class="slides">
        <img src="https://via.placeholder.com/1600x500/ff7f7f/333333?text=Slide+1" alt="Slide 1">
        <img src="https://via.placeholder.com/1600x500/ff7f7f/333333?text=Slide+2" alt="Slide 2">
        <img src="https://via.placeholder.com/1600x500/ff7f7f/333333?text=Slide+3" alt="Slide 3">
    </div>
</div>

<!-- 主内容 -->
<div class="main-content">
    <h2>欢迎来到我们的网站</h2>
    <p>我们致力于为您提供最优质的服务和体验。我们的团队拥有多年的经验，竭诚为您提供专业的解决方案。</p>
    <a href="#contact" class="cta-button">联系我们</a>
</div>

<!-- 页脚 -->
<footer>
    <p>&copy; 2025 我的公司 | <a href="#privacy-policy">隐私政策</a> | <a href="#terms-of-service">服务条款</a></p>
</footer>

</body>
</html>
